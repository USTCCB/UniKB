version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unikb-backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes: ["./data:/app/data"]
    depends_on: [redis]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unikb-frontend
    ports: ["3000:3000"]
    environment: ["NEXT_PUBLIC_API_BASE=http://localhost:8000"]
    depends_on: [backend]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: unikb-redis
    ports: ["6379:6379"]
    restart: unless-stopped
