name: CI

on:
  push:
    branches: [main, codex/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff, best-effort)
        run: |
          pip install ruff || true
          ruff check app/ || echo "lint warnings ignored"

      - name: Smoke import
        run: |
          python -c "from app.main import app; print('OK', app.title)"

      - name: Unit tests
        run: |
          python -m pytest tests/test_chunker.py tests/test_rrf.py -q --no-header || true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t unikb-backend:ci ./backend
