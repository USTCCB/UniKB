name: CI

on:
  push:
    branches: [main, codex/**]
  pull_request:
    branches: [main]

jobs:
  # 纯算法 / schema / mock 测试, 不依赖 torch / chromadb / 重模型. 跑得快, 出错早.
  backend-unit-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      LLM_PROVIDER: deepseek
      JWT_SECRET: ci-test-secret-not-for-production
      DATABASE_URL: sqlite:///./data/test.db
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install CI deps (skip heavy torch/sentence-transformers)
        run: |
          python -m pip install --upgrade pip
          # 纯算法 / schema / smoke 测试不依赖重包; 重依赖允许失败, 失败时不阻断
          pip install -r requirements.txt
          pip install "pydantic[email]" pytest pytest-asyncio pytest-cov ruff httpx "python-jose[cryptography]" "passlib[bcrypt]" "fastapi>=0.116" "pydantic>=2.9" "pydantic-settings>=2.5" python-multipart loguru langchain-core langchain-openai openai tiktoken langgraph datasets || true

      - name: Lint (ruff)
        run: |
          python -m ruff check tests/

      - name: Run unit tests + coverage (skip integration)
        run: |
          mkdir -p data
          # --ignore 集成测试; 集成测试在另一个 job 用 fake 路径跑
          python -m pytest -v \
            --ignore=tests/test_integration_retrieval.py \
            --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html \
            --junitxml=test-results-unit.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend-unit
          fail_ci_if_error: false

      - name: Archive unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: |
            backend/test-results-unit.xml
            backend/htmlcov/
          if-no-files-found: ignore

  # 集成测试: 走 fake 路径 (避免装 torch/chromadb), 验证检索/RRF/rerank/delete/pipeline 端到端.
  backend-integration-test:
    name: Backend integration tests (fake mode)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      LLM_PROVIDER: deepseek
      JWT_SECRET: ci-test-secret-not-for-production
      UNIKB_FAKE_EMBEDDING: "1"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install CI deps (fake path; no heavy ML deps required)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio "pydantic>=2.9" langchain-core loguru datasets || true

      - name: Run integration tests (full retrieval + pipeline path)
        run: |
          mkdir -p data
          # 集成测试用 _fakes.py 提供 fake Embedding/VectorStore/BM25/Reranker/LLM;
          # 不需要真 chromadb / torch / sentence_transformers.
          python -m pytest -v tests/test_integration_retrieval.py \
            --junitxml=test-results-integration.xml

      - name: Archive integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: backend/test-results-integration.xml
          if-no-files-found: ignore

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    needs: [backend-unit-test, backend-integration-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t unikb-backend:ci ./backend
